services:
  weir:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "9000:9000"
    volumes:
      - ./config.example.toml:/etc/weir/config.toml:ro
    environment:
      - WEIR_CONFIG=/etc/weir/config.toml
      - PORT=${PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: [cluster]
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    restart: unless-stopped

  weir-cluster:
    build: .
    profiles: [cluster]
    volumes:
      - ./docker/config.cluster.toml:/etc/weir/config.toml:ro
    environment:
      - WEIR_CONFIG=/etc/weir/config.toml
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on: [redis]
    deploy:
      replicas: 3
    restart: unless-stopped

  lb:
    image: nginx:1.27-alpine
    profiles: [cluster]
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [weir-cluster]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - weir
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
