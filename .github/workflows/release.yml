name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.changelog.outputs.skipped }}
      tag: ${{ steps.changelog.outputs.tag }}
      version: ${{ steps.changelog.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: TriPSs/conventional-changelog-action@v6
        id: changelog
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version-file: Cargo.toml
          version-path: 'workspace.package.version'
          pre-commit: '.github/scripts/pre-commit.js'
          git-push: true
      - uses: ncipollo/release-action@v1
        if: steps.changelog.outputs.skipped != 'true'
        with:
          tag: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}

  test:
    runs-on: ubuntu-latest
    needs: changelog
    if: needs.changelog.outputs.skipped != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.changelog.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked
      - run: cargo clippy --all-targets --locked -- -D warnings

  docker:
    runs-on: ubuntu-latest
    needs: [changelog, test]
    if: needs.changelog.outputs.skipped != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.changelog.outputs.tag }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.changelog.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
